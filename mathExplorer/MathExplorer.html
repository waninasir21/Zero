<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
           font-family: 'Inter', sans-serif;
        }

        .loading-spinner {
            border: 4px solid #374151;
            border-top: 4px solid #111827;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .math-formula {
            font-style: italic;
            color: #e5e7eb;
            color: gray-300;
            background-color: #111827;
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            border-radius: 0.375rem;
        }

        .suggestion-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid #374151;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .suggestion-tag:hover {
            background: rgba(96, 165, 250, 0.4);
            transform: translateY(-2px);
        }

        .related-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 0.5rem;
            color: #86efac;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
            margin-top: 0.5rem;
            text-decoration: none;
        }

        .related-link:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            color: #fca5a5;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 2rem 0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .suggestion-section {
            background: rgba(30, 41, 59, 0.8);
            padding: 2rem;
            border-radius: 0.75rem;
            margin-top: 2rem;
            border: 1px solid #374151;
        }

        .content-section {
            background: rgba(15, 23, 42, 0.8);
            border: 4px solid #374151;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

        .historian-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border: 1px solid #374151;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 1rem 0;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: gray-300;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon {
            font-size: 1.5rem;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen">
    <a href="../index.html" class="absolute mt-5 ml-2 bg-blue-600 text-white font-bold py-2 px-6 rounded-lg shadow-lg hover:bg-blue-700 active:bg-blue-800 transition-all">&larr; Back</a>
    <div class="container bg-gray-900 mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                Math Explorer
            </h1>
            <p class="text-gray-400 text-lg">Search for mathematical concepts, operations, and shapes</p>
            <p class="text-gray-500 text-sm mt-2">Powered by Wikipedia API</p>
        </div>

        <!-- Search Section -->
        <div class="bg-gray-800 rounded-xl shadow-2xl p-8 mb-8 border border-gray-700">
            <form id="searchForm" class="flex flex-col sm:flex-row gap-4">
                <input
                    type="text"
                    id="mathInput"
                    placeholder="Search: Addition, LCM, Triangle, Fibonacci, Derivative, Matrix..."
                    class="flex-1 px-6 py-4 border-2 border-gray-600 rounded-lg bg-gray-900 text-gray-100 placeholder-gray-400 focus:outline-none focus:border-gray-500 transition-all"
                    required
                    autocomplete="off"
                >
                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-lg active:bg-blue-800 transition-all shadow-lg "
                >
                    Search
                </button>
            </form>
        </div>

        <!-- Suggestions Section -->
        <div class="suggestion-section">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-gray-300 font-semibold">📚 Popular Math Terms:</h3>
                <button id="refreshBtn" class="text-gray-400 hover:text-gray-600 transition-all flex items-center gap-2 text-sm">
                    🔄 Refresh
                </button>
            </div>
            <div id="suggestionsContainer" class="flex flex-wrap gap-2">
                <!-- Suggestions will be inserted here -->
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingContainer" class="flex justify-center items-center py-16 hidden">
            <div class="loading-spinner"></div>
            <span class="ml-4 text--400 font-semibold">Searching Wikipedia...</span>
        </div>

        <!-- Error Message -->
        <div id="errorContainer" class="hidden">
            <div class="error-box" id="errorMessage"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <p class="text-2xl mb-2">🔍 Start Exploring!</p>
            <p>Type a mathematical term or click a suggestion to learn more</p>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="hidden fade-in">
            <!-- Content will be inserted here -->
        </div>
    </div>

    <script>
        const WIKIPEDIA_API = 'https://en.wikipedia.org/w/api.php';

        // Comprehensive database of valid math terms
        const validMathTerms = {
            // Arithmetic & Basic Operations
            'addition': true, 'subtraction': true, 'multiplication': true, 'division': true,
            'arithmetic': true, 'modulo': true, 'exponentiation': true, 'power': true,
            
            // Number Theory
            'prime number': true, 'composite number': true, 'lcm': true, 'hcf': true, 
            'gcd': true, 'integer': true, 'rational number': true, 'irrational number': true,
            'fraction': true, 'decimal': true, 'percentage': true, 'ratio': true,
            
            // Algebra
            'algebra': true, 'equation': true, 'linear equation': true, 'quadratic equation': true,
            'polynomial': true, 'variable': true, 'coefficient': true, 'factor': true,
            'algebraic expression': true, 'binomial': true, 'trinomial': true,
            'inequality': true, 'absolute value': true,
            
            // Geometry (2D)
            'geometry': true, 'triangle': true, 'rectangle': true, 'square': true,
            'circle': true, 'polygon': true, 'pentagon': true, 'hexagon': true,
            'heptagon': true, 'octagon': true, 'nonagon': true, 'decagon': true,
            'ellipse': true, 'parallelogram': true, 'trapezoid': true, 'rhombus': true,
            'angle': true, 'arc': true, 'sector': true, 'radius': true,
            'diameter': true, 'circumference': true, 'perimeter': true, 'area': true,
            
            // Geometry (3D)
            'cube': true, 'sphere': true, 'cylinder': true, 'cone': true,
            'pyramid': true, 'prism': true, 'volume': true, 'surface area': true,
            'tetrahedron': true, 'hexahedron': true, 'octahedron': true,
            
            // Trigonometry
            'trigonometry': true, 'sine': true, 'cosine': true, 'tangent': true,
            'cosecant': true, 'secant': true, 'cotangent': true, 'radian': true,
            
            // Calculus
            'calculus': true, 'derivative': true, 'integral': true, 'limit': true,
            'continuity': true, 'differential': true, 'gradient': true,
            
            // Linear Algebra
            'matrix': true, 'vector': true, 'determinant': true, 'eigenvalue': true,
            'linear algebra': true, 'scalar': true, 'tensor': true,
            
            // Famous Theorems & Concepts
            'pythagorean theorem': true, 'fibonacci sequence': true, 'golden ratio': true,
            'pascal triangle': true, 'binomial theorem': true, 'taylor series': true,
            
            // Probability & Statistics
            'probability': true, 'statistics': true, 'mean': true, 'median': true,
            'mode': true, 'standard deviation': true, 'variance': true, 'distribution': true,
            'normal distribution': true, 'binomial distribution': true, 'permutation': true,
            'combination': true, 'factorial': true,
            
            // Set Theory & Logic
            'set': true, 'set theory': true, 'logic': true, 'boolean': true,
            'union': true, 'intersection': true, 'complement': true, 'cardinality': true,
            
            // Functions
            'function': true, 'domain': true, 'range': true, 'inverse function': true,
            'exponential function': true, 'logarithm': true, 'logarithmic function': true,
            
            // Number Systems
            'binary': true, 'hexadecimal': true, 'decimal': true, 'octal': true,
            'number system': true, 'real number': true, 'complex number': true,
            'imaginary number': true, 'natural number': true, 'whole number': true,
            
            // Miscellaneous
            'exponent': true, 'root': true, 'square root': true, 'cube root': true,
            'congruence': true, 'modular arithmetic': true,
            'sequence': true, 'series': true, 'convergence': true, 'divergence': true,
            'coordinate': true, 'graph': true, 'asymptote': true, 'symmetry': true
        };

        // Popular math terms for suggestions (display list)
        const mathSuggestions = [
            'Addition', 'Subtraction', 'Multiplication', 'Division',
            'Prime Number', 'Fibonacci Sequence', 'LCM', 'HCF', 'GCD',
            'Triangle', 'Rectangle', 'Circle', 'Polygon', 'Pentagon',
            'Algebra', 'Geometry', 'Calculus', 'Derivative', 'Integral',
            'Matrix', 'Determinant', 'Vector', 'Pythagorean Theorem',
            'Quadratic Equation', 'Linear Equation', 'Set Theory',
            'Statistics', 'Probability', 'Trigonometry', 'Sine', 'Cosine',
            'Logarithm', 'Exponential Function', 'Factorial', 'Permutation',
            'Combination', 'Mean', 'Median', 'Mode', 'Standard Deviation'
        ];

        // DOM Elements
        const searchForm = document.getElementById('searchForm');
        const mathInput = document.getElementById('mathInput');
        const loadingContainer = document.getElementById('loadingContainer');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        const resultsContainer = document.getElementById('resultsContainer');
        const emptyState = document.getElementById('emptyState');
        const suggestionsContainer = document.getElementById('suggestionsContainer');

        // Initialize suggestions
        function initializeSuggestions() {
            const shuffled = mathSuggestions.sort(() => Math.random() - 0.5).slice(0, 6);
            suggestionsContainer.innerHTML = shuffled.map(term => 
                `<div class="suggestion-tag" onclick="searchMath('${term}')">${term}</div>`
            ).join('');
        }

        // Refresh suggestions with new random terms
        document.getElementById('refreshBtn').addEventListener('click', initializeSuggestions);

        // Search form submission
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const term = mathInput.value.trim();
            if (!term) {
                showError('Please enter a term');
                return;
            }
            
            // Validate if term is mathematical
            if (!isValidMathTerm(term)) {
                showError(`❌ "<strong>${term}</strong>" is not a mathematical term. Please try another term like: Addition, Triangle, Calculus, Probability, etc.`);
                emptyState.classList.remove('hidden');
                return;
            }
            
            await searchMath(term);
        });

        // Validate if input is a mathematical term
        function isValidMathTerm(term) {
            const termLower = term.toLowerCase();
            return validMathTerms.hasOwnProperty(termLower);
        }

        // Main search function
        async function searchMath(term) {
            mathInput.value = term;
            showLoading(true);
            hideError();
            emptyState.classList.add('hidden');
            resultsContainer.classList.add('hidden');

            try {
                // First, fetch the page content
                const response = await fetch(
                    `${WIKIPEDIA_API}?action=query&format=json&origin=*&titles=${encodeURIComponent(term)}&prop=extracts&explaintext=true&exintro=true`,
                    { headers: { 'Api-User-Agent': 'MathExplorer/1.0 (math-learning-app)' } }
                );
                
                const data = await response.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                const page = pages[pageId];

                if (page.missing !== undefined) {
                    showError(`❌ No results found for "<strong>${term}</strong>". Try another term!`);
                    emptyState.classList.remove('hidden');
                    showLoading(false);
                    return;
                }

                // Fetch full page content for more details
                const fullResponse = await fetch(
                    `${WIKIPEDIA_API}?action=parse&format=json&origin=*&page=${encodeURIComponent(term)}&prop=text|sections&redirects=1`,
                    { headers: { 'Api-User-Agent': 'MathExplorer/1.0 (math-learning-app)' } }
                );

                const fullData = await fullResponse.json();
                const parseData = fullData.parse || {};

                await displayResults(term, page, parseData);
                showLoading(false);

            } catch (error) {
                console.error('Search Error:', error);
                showError(`⚠️ Error fetching data. Please try again.`);
                emptyState.classList.remove('hidden');
                showLoading(false);
            }
        }

        // Display results
        async function displayResults(term, page, parseData) {
            let html = `
                <div class="fade-in">
                    <div class="mb-8">
                        <h2 class="text-4xl font-bold text-blue-400 mb-4">${term}</h2>
                        
                        <div class="content-section">
                            <div class="section-title">
                                <span class="icon">📖</span>
                                Definition & Overview
                            </div>
                            <div id="imageContainer"></div>
                            <p class="text-gray-300 leading-relaxed">
                                ${page.extract || 'Information not available.'}
                            </p>
                        </div>
            `;

     

            // Add helpful tips based on the term
            html += generateMathTips(term);

            // Add related searches
            html += `
                <div class="content-section">
                    <div class="section-title">
                        <span class="icon">🔗</span>
                        Related Concepts
                    </div>
                    <div class="flex flex-wrap gap-2">
            `;

            const relatedTerms = getRelatedTerms(term);
            relatedTerms.forEach(relTerm => {
                html += `<div class="related-link" onclick="searchMath('${relTerm}')">${relTerm}</div>`;
            });

            html += `
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(term)}" target="_blank" 
                       class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg active:bg-blue-800 transition-all">
                        📖 Read Full Article on Wikipedia
                    </a>
                </div>
            `;

            resultsContainer.innerHTML = html;
            resultsContainer.classList.remove('hidden');


        }

        // Generate math tips
        function generateMathTips(term) {
            const termLower = term.toLowerCase();
            let tips = `
                <div class="historian-box">
                    <div class="section-title">
                        <span class="icon">💡</span>
                        Key Points
                    </div>
            `;

            if (termLower.includes('addition') || termLower.includes('subtraction')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Basic arithmetic operations</li>
                        <li>✓ Foundation for higher mathematics</li>
                        <li>✓ Commutative property: a + b = b + a</li>
                    </ul>
                    <div class="math-formula">Difference: a - b = result</div>
                `;
            } else if (termLower.includes('lcm') || termLower.includes('hcf') || termLower.includes('gcd')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ LCM: Least Common Multiple</li>
                        <li>✓ HCF/GCD: Highest Common Factor / Greatest Common Divisor</li>
                        <li>✓ Essential for fraction operations</li>
                    </ul>
                    <div class="math-formula">For a & b: LCM × GCD = a × b</div>
                `;
            } else if (termLower.includes('triangle')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Three-sided polygon</li>
                        <li>✓ Sum of angles = 180°</li>
                        <li>✓ Types: Equilateral, Isosceles, Scalene</li>
                    </ul>
                    <div class="math-formula">Area = ½ × base × height</div>
                `;
            } else if (termLower.includes('rectangle')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Four-sided polygon with right angles</li>
                        <li>✓ Opposite sides are equal</li>
                        <li>✓ Special case: Square (all sides equal)</li>
                    </ul>
                    <div class="math-formula">Area = length × width | Perimeter = 2(l + w)</div>
                `;
            } else if (termLower.includes('circle')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ All points equidistant from center</li>
                        <li>✓ Radius, Diameter, Circumference</li>
                        <li>✓ Based on mathematical constant π</li>
                    </ul>
                    <div class="math-formula">Area = πr² | Circumference = 2πr</div>
                `;
            } else if (termLower.includes('fibonacci')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Sequence: 0, 1, 1, 2, 3, 5, 8, 13...</li>
                        <li>✓ Each number = sum of previous two</li>
                        <li>✓ Found in nature and art</li>
                    </ul>
                    <div class="math-formula">F(n) = F(n-1) + F(n-2)</div>
                `;
            } else if (termLower.includes('pythagorean')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Applies to right triangles</li>
                        <li>✓ Named after Greek mathematician Pythagoras</li>
                        <li>✓ Foundation of trigonometry</li>
                    </ul>
                    <div class="math-formula">a² + b² = c² (where c is hypotenuse)</div>
                `;
            } else if (termLower.includes('derivative') || termLower.includes('calculus')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Rate of change of a function</li>
                        <li>✓ Fundamental concept in Calculus</li>
                        <li>✓ Applied in physics and engineering</li>
                    </ul>
                    <div class="math-formula">f'(x) = lim[h→0] (f(x+h) - f(x))/h</div>
                `;
            } else if (termLower.includes('prime')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Numbers divisible only by 1 and itself</li>
                        <li>✓ Building blocks of all integers</li>
                        <li>✓ First prime: 2</li>
                    </ul>
                    <div class="math-formula">Examples: 2, 3, 5, 7, 11, 13, 17, 19, 23...</div>
                `;
            } else if (termLower.includes('probability') || termLower.includes('statistics')) {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Probability: Likelihood of an event (0 to 1)</li>
                        <li>✓ Statistics: Analysis of data</li>
                        <li>✓ Used in decision-making and predictions</li>
                    </ul>
                    <div class="math-formula">P(event) = favorable outcomes / total outcomes</div>
                `;
            } else {
                tips += `
                    <ul class="text-gray-300 space-y-2 ml-4">
                        <li>✓ Important mathematical concept</li>
                        <li>✓ Check Wikipedia for detailed information</li>
                        <li>✓ Try related searches for more insights</li>
                    </ul>
                `;
            }

            tips += `</div>`;
            return tips;
        }

        // Get related terms
        function getRelatedTerms(term) {
            const termLower = term.toLowerCase();
            const relationships = {
                'addition': ['Subtraction', 'Multiplication', 'Arithmetic'],
                'subtraction': ['Addition', 'Multiplication', 'Integer'],
                'multiplication': ['Division', 'Addition', 'Exponentiation'],
                'division': ['Multiplication', 'Fraction', 'Ratio'],
                'lcm': ['HCF', 'GCD', 'Prime Number', 'Integer'],
                'hcf': ['LCM', 'GCD', 'Prime Number', 'Integer'],
                'gcd': ['LCM', 'HCF', 'Prime Number'],
                'triangle': ['Geometry', 'Pythagorean Theorem', 'Polygon', 'Area'],
                'rectangle': ['Square', 'Polygon', 'Perimeter', 'Area'],
                'circle': ['Radius', 'Diameter', 'Circumference', 'Area'],
                'polygon': ['Triangle', 'Rectangle', 'Pentagon', 'Geometry'],
                'fibonacci': ['Golden Ratio', 'Sequence', 'Pattern', 'Nature'],
                'pythagorean theorem': ['Right Triangle', 'Trigonometry', 'Geometry'],
                'prime number': ['Composite Number', 'Integer', 'Number Theory'],
                'derivative': ['Calculus', 'Integral', 'Function', 'Limit'],
                'integral': ['Derivative', 'Calculus', 'Area', 'Volume'],
                'matrix': ['Linear Algebra', 'Determinant', 'Vector'],
                'vector': ['Matrix', 'Scalar', 'Direction', 'Magnitude'],
                'factorial': ['Permutation', 'Combination', 'Probability'],
                'trigonometry': ['Sine', 'Cosine', 'Tangent', 'Angle'],
                'sine': ['Trigonometry', 'Cosine', 'Tangent', 'Wave'],
                'cosine': ['Trigonometry', 'Sine', 'Tangent', 'Wave'],
                'probability': ['Statistics', 'Permutation', 'Combination'],
                'statistics': ['Mean', 'Median', 'Mode', 'Standard Deviation'],
                'algebra': ['Equation', 'Polynomial', 'Variable', 'Function'],
                'geometry': ['Triangle', 'Circle', 'Polygon', 'Area']
            };
            // Default related terms
            return ['Algebra', 'Geometry', 'Calculus', 'Number Theory'];
        }

        // Utility functions
        function showLoading(isLoading) {
            loadingContainer.classList.toggle('hidden', !isLoading);
        }

        function showError(message) {
            errorMessage.innerHTML = message;
            errorContainer.classList.remove('hidden');
        }

        function hideError() {
            errorContainer.classList.add('hidden');
        }

        // Initialize
        initializeSuggestions();
    </script>
</body>
</html>
