<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Viewer</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Load math.js for equation parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.6.4/math.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex flex-col p-4">

    <!-- Header -->
    <header class="flex-shrink-0 mb-4">
        <div class="flex justify-between items-center">
            <a href="file:///F:/PROJECTS/Zero/Graph/Input/input.html" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg shadow-lg hover:bg-blue-700 active:bg-blue-800 transition-all">
                &larr; Back
            </a>
            <h1 class="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 text-right truncate ml-4">
                Graphing: <code id="equationDisplay" class="text-cyan-300">...</code>
            </h1>
        </div>
    </header>

    <!-- Graph Container -->
    <div class="flex-grow bg-black rounded-lg shadow-2xl overflow-hidden relative">
        <canvas id="graphCanvas" width="1313" height="500"></canvas>
    </div>
    
    <!-- Message Area -->
    <div id="messageArea" class="text-center mt-4 h-6 text-red-400"></div>

    <script>
        // --- Canvas & Plotting Globals ---
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const messageArea = document.getElementById('messageArea');
        const equationDisplay = document.getElementById('equationDisplay');

        // Plotting parameters
        let rangeX = { min: -25, max: 25 };
        let rangeY = { min: -25, max: 25 };
        let scaleX, scaleY;
        let originX, originY;
        let compiledFunc;

        /**
         * Main function to initialize the graph
         */
        function init() {
            // 1. Get equation from URL
            const urlParams = new URLSearchParams(window.location.search);
            const equationString = urlParams.get('equation');

            if (!equationString) {
                showMessage("No equation provided.");
                return;
            }
            
            const decodedEquation = decodeURIComponent(equationString);
            equationDisplay.textContent = decodedEquation;

            // 2. Parse the equation
            try {
                compiledFunc = math.parse(decodedEquation).compile();
            } catch (err) {
                showMessage(`Error: ${err.message}`);
                return;
            }

            // 3. Setup canvas and draw
            setupCanvas();
            drawGraph();

            // 4. Redraw on window resize
            window.addEventListener('resize', () => {
                setupCanvas();
                drawGraph();
            });
        }

        /**
         * Sets canvas dimensions and calculates transform
         */
        function setupCanvas() {
            // Set canvas to fill its container
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            // Calculate scale
            scaleX = canvas.width / (rangeX.max - rangeX.min);
            scaleY = canvas.height / (rangeY.max - rangeY.min);

            // Calculate origin (pixel coordinates of (0,0))
            originX = -rangeX.min * scaleX;
            originY = rangeY.max * scaleY;
        }

        /**
         * Helper to convert math coordinates to canvas pixel coordinates
         */
        function mathToCanvas(x, y) {
            const px = x * scaleX + originX;
            const py = -y * scaleY + originY;
            return { x: px, y: py };
        }
        
        /**
         * Draws the X and Y axes (in green) and gridlines
         */
        function drawAxes() {
            ctx.save();
            ctx.strokeStyle = '#00FF00'; // Solid Green
            ctx.lineWidth = 2;

            // Draw X Axis
            ctx.beginPath();
            let yOrigin = mathToCanvas(0, 0).y;
            ctx.moveTo(0, yOrigin);
            ctx.lineTo(canvas.width, yOrigin);
            ctx.stroke();

            // Draw Y Axis
            ctx.beginPath();
            let xOrigin = mathToCanvas(0, 0).x;
            ctx.moveTo(xOrigin, 0);
            ctx.lineTo(xOrigin, canvas.height);
            ctx.stroke();
            
            // --- Draw Gridlines (optional but helpful) ---
            ctx.strokeStyle = '#224422'; // Dark Green
            ctx.lineWidth = 0.5;
            
            // Vertical gridlines
            for (let x = Math.ceil(rangeX.min); x <= Math.floor(rangeX.max); x++) {
                if (x === 0) continue; // Skip origin
                let px = mathToCanvas(x, 0).x;
                ctx.beginPath();
                ctx.moveTo(px, 0);
                ctx.lineTo(px, canvas.height);
                ctx.stroke();
            }
            
            // Horizontal gridlines
            for (let y = Math.ceil(rangeY.min); y <= Math.floor(rangeY.max); y++) {
                if (y === 0) continue; // Skip origin
                let py = mathToCanvas(0, y).y;
                ctx.beginPath();
                ctx.moveTo(0, py);
                ctx.lineTo(canvas.width, py);
                ctx.stroke();
            }

            ctx.restore();
        }

        /**
         * Draws the function line (in blue)
         */
        function drawFunction() {
            ctx.save();
            ctx.strokeStyle = '#0099ff'; // Bright Blue
            ctx.lineWidth = 3;
            ctx.beginPath();

            const pixelsPerUnit = 1 / scaleX; // Plot one point per horizontal pixel
            let firstPoint = true;

            for (let px = 0; px <= canvas.width; px++) {
                // Convert pixel x to math x
                const x = (px - originX) / scaleX;
                
                try {
                    const y = compiledFunc.evaluate({ x: x });

                    // Handle discontinuities (Infinity, NaN)
                    if (!isFinite(y) || isNaN(y)) {
                        firstPoint = true; // Start a new path segment
                        continue;
                    }

                    const canvasCoords = mathToCanvas(x, y);

                    if (firstPoint) {
                        ctx.moveTo(canvasCoords.x, canvasCoords.y);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(canvasCoords.x, canvasCoords.y);
                    }

                } catch (e) {
                    firstPoint = true; // Error in evaluation (e.g., log(-1))
                }
            }

            ctx.stroke();
            ctx.restore();
        }

        /**
         * Clears and redraws the entire graph
         */
        function drawGraph() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawAxes();
            drawFunction();
        }
        
        /**
         * Shows an error message
         */
        function showMessage(message) {
            messageArea.innerText = message;
        }
        
        // --- Run ---
        init();
    </script>
</body>
</html>
